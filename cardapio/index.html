<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardápio Digital</title>
  <style>
    :root{
      --bg:#121212;
      --card:#1e1e1e;
      --gold:#d4af37;
      --text:#ffffff;
      --muted:#bdbdbd;
      --green:#25d366;
      --line:#2d2d2d;
      --danger:#ef4444;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Segoe UI', Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding-bottom:190px;
    }

    header{
      background:#181818;
      border-bottom:1px solid var(--line);
      padding:20px 16px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:20;
    }

    header h1{
      margin:0;
      color:var(--gold);
      font-size:1.7rem;
    }

    header p{
      margin:6px 0 0;
      color:var(--muted);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:16px;
    }

    .mesa-box{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      margin-bottom:16px;
    }

    .mesa-box label{
      display:block;
      margin-bottom:8px;
      color:var(--gold);
      font-weight:700;
    }

    .mesa-box input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #444;
      background:#111;
      color:#fff;
      outline:none;
    }

    .categoria{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      margin-bottom:18px;
    }

    .categoria h2{
      margin:0 0 14px;
      color:var(--gold);
      border-left:4px solid var(--gold);
      padding-left:10px;
      font-size:1.15rem;
    }

    .produtos{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:14px;
    }

    .produto{
      background:#171717;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      transition:.2s ease;
    }

    .produto:hover{
      transform:translateY(-2px);
    }

    .produto-img{
      width:100%;
      height:160px;
      object-fit:cover;
      background:#222;
      display:block;
    }

    .produto-img.placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      color:#777;
      font-size:.9rem;
    }

    .produto-body{
      padding:14px;
    }

    .produto-body h3{
      margin:0 0 8px;
      font-size:1.05rem;
    }

    .produto-body p{
      margin:0 0 10px;
      color:var(--muted);
      font-size:.92rem;
      line-height:1.4;
      min-height:38px;
    }

    .tag{
      display:inline-block;
      background:var(--danger);
      color:#fff;
      font-size:.75rem;
      font-weight:700;
      padding:5px 9px;
      border-radius:999px;
      margin-bottom:10px;
    }

    .preco-box{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .preco{
      font-size:1rem;
      font-weight:700;
      color:var(--gold);
    }

    .preco-antigo{
      color:#888;
      text-decoration:line-through;
      font-size:.9rem;
    }

    .btn{
      border:none;
      border-radius:10px;
      padding:11px 12px;
      font-weight:700;
      cursor:pointer;
      width:100%;
    }

    .btn-add{
      background:var(--gold);
      color:#111;
    }

    .btn-indisponivel{
      background:#444;
      color:#aaa;
      cursor:not-allowed;
    }

    .cart-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      background:#181818;
      border-top:2px solid var(--gold);
      padding:14px;
      z-index:30;
      box-shadow:0 -8px 24px rgba(0,0,0,.35);
    }

    .cart-inner{
      max-width:1100px;
      margin:0 auto;
    }

    .cart-title{
      color:var(--gold);
      font-weight:700;
      margin-bottom:8px;
    }

    .cart-list{
      color:#eee;
      font-size:.92rem;
      line-height:1.5;
      max-height:110px;
      overflow:auto;
      margin-bottom:10px;
    }

    .cart-total{
      font-weight:700;
      margin-bottom:10px;
    }

    textarea{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid #444;
      background:#111;
      color:#fff;
      margin-bottom:10px;
      outline:none;
    }

    .cart-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btn-sec{
      background:#2f3540;
      color:#fff;
    }

    .btn-main{
      background:var(--green);
      color:#fff;
      margin-top:10px;
    }

    .rodape-dev{
      margin:30px 0 10px;
      padding:24px 16px;
      text-align:center;
      border-top:1px solid var(--line);
      color:#9ca3af;
      font-size:14px;
      line-height:1.8;
    }

    .rodape-dev a{
      color:var(--gold);
      font-weight:700;
      text-decoration:none;
    }

    .rodape-dev a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

  <header>
    <h1 id="nomeRestaurante">Carregando...</h1>
    <p>Cardápio digital</p>
  </header>

  <div class="wrap">
    <div class="mesa-box">
      <label for="mesa">Número da mesa</label>
      <input id="mesa" type="text" placeholder="Ex: 7">
    </div>

    <div id="cardapio"></div>

    <footer class="rodape-dev">
      <p>Restaurante do Felipe - 2026 © Todos os direitos reservados</p>
      <p>
        Desenvolvido por
        <a href="https://thcompany011-crypto.github.io/web-design-sales/" target="_blank">
          TH COMPANY
        </a>
      </p>
    </footer>
  </div>

  <div class="cart-bar">
    <div class="cart-inner">
      <div class="cart-title">Seu pedido</div>
      <div id="listaPedido" class="cart-list">Nenhum item adicionado.</div>
      <div id="totalPedido" class="cart-total">Total: R$ 0,00</div>
      <textarea id="observacao" rows="2" placeholder="Observação do pedido"></textarea>

      <div class="cart-actions">
        <button class="btn btn-sec" onclick="limparPedido()">Limpar</button>
        <button class="btn btn-sec" onclick="salvarMesa()">Salvar mesa</button>
      </div>

      <button class="btn btn-main" onclick="enviarPedido()">Enviar pedido</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      query,
      orderBy,
      onSnapshot,
      addDoc,
      doc,
      getDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCOMS_DP1TEsoHQKEI44sM0jsj-7EBms84",
      authDomain: "restaurante-felipe.firebaseapp.com",
      projectId: "restaurante-felipe",
      storageBucket: "restaurante-felipe.firebasestorage.app",
      messagingSenderId: "917737239535",
      appId: "1:917737239535:web:decb1cef3b7bd84183fc1a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const nomeRestaurante = document.getElementById("nomeRestaurante");
    const cardapio = document.getElementById("cardapio");
    const mesaInput = document.getElementById("mesa");
    const listaPedido = document.getElementById("listaPedido");
    const totalPedido = document.getElementById("totalPedido");
    const observacao = document.getElementById("observacao");

    let pedido = [];
    let categoriasCache = [];
    let produtosCache = [];

    function formatar(valor){
      return Number(valor || 0).toFixed(2).replace(".", ",");
    }

    function obterMesaURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get("mesa") || "";
    }

    async function carregarConfig() {
      const snap = await getDoc(doc(db, "config", "restaurante"));
      if (snap.exists()) {
        const data = snap.data();
        nomeRestaurante.textContent = data.nome || "Restaurante";
      }
    }

    function ouvirCategorias() {
      const q = query(collection(db, "categorias"), orderBy("ordem"));
      onSnapshot(q, (snapshot) => {
        categoriasCache = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizar();
      });
    }

    function ouvirProdutos() {
      onSnapshot(collection(db, "produtos"), (snapshot) => {
        produtosCache = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        renderizar();
      });
    }

    function renderizar() {
      if (!categoriasCache.length) {
        cardapio.innerHTML = `<p style="color:#999;">Nenhuma categoria cadastrada.</p>`;
        return;
      }

      const produtosAtivos = produtosCache.filter(p => p.disponivel !== false);
      cardapio.innerHTML = "";

      categoriasCache.forEach(cat => {
        const itens = produtosAtivos.filter(p => p.categoria === cat.nome);
        if (!itens.length) return;

        const sec = document.createElement("section");
        sec.className = "categoria";

        sec.innerHTML = `
          <h2>${cat.nome}</h2>
          <div class="produtos">
            ${itens.map(p => {
              const precoFinal = p.promocaoAtiva ? p.precoPromocional : p.preco;
              const imagem = p.imagem
                ? `<img class="produto-img" src="${p.imagem}" alt="${p.nome}">`
                : `<div class="produto-img placeholder">Sem imagem</div>`;

              return `
                <div class="produto">
                  ${imagem}
                  <div class="produto-body">
                    ${p.promocaoAtiva ? `<span class="tag">Promoção</span>` : ""}
                    <h3>${p.nome}</h3>
                    <p>${p.descricao || ""}</p>
                    <div class="preco-box">
                      ${p.promocaoAtiva ? `<span class="preco-antigo">R$ ${formatar(p.preco)}</span>` : ""}
                      <span class="preco">R$ ${formatar(precoFinal)}</span>
                    </div>
                    <button class="btn ${p.disponivel === false ? "btn-indisponivel" : "btn-add"}"
                      ${p.disponivel === false ? "disabled" : ""}
                      data-id="${p.id}">
                      ${p.disponivel === false ? "Indisponível" : "Adicionar"}
                    </button>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;

        cardapio.appendChild(sec);
      });

      document.querySelectorAll("[data-id]").forEach(btn => {
        btn.addEventListener("click", () => adicionarItem(btn.dataset.id));
      });
    }

    function adicionarItem(id) {
      const p = produtosCache.find(item => item.id === id);
      if (!p) return;

      const preco = p.promocaoAtiva ? Number(p.precoPromocional || 0) : Number(p.preco || 0);

      pedido.push({
        produtoId: p.id,
        nome: p.nome,
        preco,
        qtd: 1
      });

      atualizarPedido();
    }

    function atualizarPedido() {
      if (!pedido.length) {
        listaPedido.innerHTML = "Nenhum item adicionado.";
        totalPedido.textContent = "Total: R$ 0,00";
        return;
      }

      listaPedido.innerHTML = pedido.map((item, i) =>
        `${i + 1}. ${item.nome} - R$ ${formatar(item.preco)}`
      ).join("<br>");

      const total = pedido.reduce((acc, item) => acc + item.preco, 0);
      totalPedido.textContent = `Total: R$ ${formatar(total)}`;
    }

    window.limparPedido = function() {
      pedido = [];
      observacao.value = "";
      atualizarPedido();
    }

    window.salvarMesa = function() {
      localStorage.setItem("mesa_atual", mesaInput.value.trim());
      alert("Mesa salva.");
    }

    window.enviarPedido = async function() {
      const mesa = mesaInput.value.trim();
      if (!mesa) {
        alert("Informe o número da mesa.");
        return;
      }

      if (!pedido.length) {
        alert("Adicione pelo menos um item.");
        return;
      }

      const total = pedido.reduce((acc, item) => acc + item.preco, 0);

      await addDoc(collection(db, "pedidos"), {
        mesa,
        itens: pedido,
        total,
        observacao: observacao.value.trim(),
        status: "novo",
        horario: serverTimestamp(),
        origem: "qr"
      });

      alert("Pedido enviado com sucesso!");
      pedido = [];
      observacao.value = "";
      atualizarPedido();
    }

    async function iniciar() {
      mesaInput.value = obterMesaURL() || localStorage.getItem("mesa_atual") || "";
      await carregarConfig();
      ouvirCategorias();
      ouvirProdutos();
      atualizarPedido();
    }

    iniciar();
  </script>
</body>
</html>
